<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alkaid (破军) — War Simulator</title>
    <style>
      /* Step 18d: Seal Script font */
      @font-face {
        font-family: 'Seal Script';
        src: url('/assets/fonts/chongxi-seal.woff2') format('woff2');
        font-display: swap;
        unicode-range: U+4E00-9FFF, U+3400-4DBF;
      }

      * {
        margin: 0; padding: 0; box-sizing: border-box;
        font-family: 'Seal Script', 'Noto Serif SC', serif;
      }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; }
      #game-container { width: 100%; height: 100%; position: relative; }
      #game-container canvas { display: block; }

      /* Step 18e: UI transition classes */
      .alkaid-overlay {
        transition: opacity 200ms ease, transform 200ms ease;
      }
      .alkaid-overlay.alkaid-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .alkaid-modal {
        transition: opacity 200ms ease, transform 200ms ease;
      }
      .alkaid-modal.alkaid-hidden {
        opacity: 0;
        transform: scale(0.95);
        pointer-events: none;
      }
      .alkaid-sidebar {
        transition: transform 300ms ease;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
